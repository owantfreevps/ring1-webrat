<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RING-1 | Login</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ffcc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: #0a0a0a;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 0 30px rgba(0,255,204,0.2);
        }
        h2 { text-align: center; margin-bottom: 30px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #00ffcc;
            color: #00ffcc; font-family: monospace;
        }
        button {
            width: 100%; padding: 12px;
            background: #00ffcc; color: #0a0a0a;
            border: none; font-weight: bold; cursor: pointer;
            margin-top: 20px;
        }
        .error { color: #ff0033; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔷 RING-1 C&C</h2>
        <input type="text" id="username" placeholder="username" autocomplete="off">
        <input type="password" id="password" placeholder="password">
        <button onclick="login()">AUTHENTICATE</button>
        <div class="error" id="error"></div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (response.ok) window.location.href = '/dashboard.html';
            else document.getElementById('error').innerText = 'Invalid credentials';
        }
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
    </script>
</body>
</html>
