<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RING-1 WebRat - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 40px;
            width: 400px;
            max-width: 90%;
        }
        .logo { text-align: center; font-size: 32px; font-weight: bold; color: #667eea; margin-bottom: 30px; }
        .logo span { color: #764ba2; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .error { color: #e74c3c; text-align: center; margin-top: 15px; font-size: 14px; }
        .info { text-align: center; margin-top: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">RING-1 <span>WebRat</span></div>
        <h2>Вход в систему</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" id="username" required placeholder="admin">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="••••••">
            </div>
            <button type="submit">Войти</button>
            <div id="error" class="error"></div>
        </form>
        <div class="info">Логин: admin / Пароль: webrat2024</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard.html';
                } else {
                    document.getElementById('error').textContent = data.message;
                }
            } catch (error) {
                document.getElementById('error').textContent = 'Ошибка соединения';
            }
        });
    </script>
</body>
</html>
